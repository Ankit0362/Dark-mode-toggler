<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Dark Mode Toggle</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Theme Settings</h1>
      <p>Use the button below to switch between light and dark themes.</p>
      
      <div class="controls">
        <label for="togglebtn">Interface Theme:</label>
        <button id="togglebtn">Switch to Dark Mode</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
